<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocumentConverter - Markdown 转 Word / PDF</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #2d3748;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 720px;
    width: 100%;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 8px;
    color: #1a202c;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #718096;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .upload-area {
    border: 2px dashed #cbd5e0;
    border-radius: 12px;
    padding: 50px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #f7fafc;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #667eea;
    background: #edf2f7;
  }
  .upload-area.has-file {
    border-color: #48bb78;
    background: #f0fff4;
  }
  .upload-icon {
    font-size: 48px;
    margin-bottom: 12px;
    color: #667eea;
  }
  .upload-text {
    color: #4a5568;
    font-size: 15px;
  }
  .upload-hint {
    color: #a0aec0;
    font-size: 12px;
    margin-top: 8px;
  }
  .file-list {
    display: none;
    margin-top: 16px;
    max-height: 220px;
    overflow-y: auto;
  }
  .file-list.show { display: block; }
  .file-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .file-list-title {
    font-size: 13px;
    color: #4a5568;
    font-weight: 600;
  }
  .file-list-clear {
    background: #fed7d7;
    color: #c53030;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #edf2f7;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .file-item-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .file-type-badge {
    background: #667eea;
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .file-type-badge.img { background: #38b2ac; }
  .file-item-name {
    font-size: 13px;
    color: #2d3748;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-item-size {
    font-size: 11px;
    color: #a0aec0;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .file-item-remove {
    background: none;
    border: none;
    color: #e53e3e;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    flex-shrink: 0;
    line-height: 1;
  }
  .file-item-remove:hover { color: #c53030; }
  .filename-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #cbd5e0;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 16px;
    outline: none;
    transition: border 0.2s;
  }
  .filename-input:focus { border-color: #667eea; }
  .filename-label {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    color: #4a5568;
    font-weight: 500;
  }
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .submit-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
  }
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .progress {
    display: none;
    margin-top: 20px;
    text-align: center;
  }
  .progress.show { display: block; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid #e2e8f0;
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text {
    margin-top: 10px;
    color: #4a5568;
    font-size: 14px;
  }
  .result {
    display: none;
    margin-top: 24px;
    padding: 20px;
    background: #f0fff4;
    border: 1px solid #9ae6b4;
    border-radius: 10px;
  }
  .result.show { display: block; }
  .result-title {
    color: #22543d;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .download-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .download-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #c6f6d5;
  }
  .download-item-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  .format-badge {
    background: #667eea;
    color: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .format-badge.pdf { background: #e53e3e; }
  .download-btn {
    background: #48bb78;
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
  }
  .download-btn:hover { background: #38a169; }
  .error {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    background: #fff5f5;
    border: 1px solid #feb2b2;
    border-radius: 8px;
    color: #c53030;
    font-size: 14px;
  }
  .error.show { display: block; }
  .features {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #e2e8f0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    text-align: center;
  }
  .feature {
    padding: 12px;
  }
  .feature-icon { font-size: 24px; margin-bottom: 4px; }
  .feature-text { font-size: 12px; color: #718096; }
</style>
</head>
<body>
  <div class="container">
    <h1>DocumentConverter</h1>
    <p class="subtitle">将 Markdown 文件转换为 Word 和 PDF 格式，支持图片嵌入</p>

    <form id="convertForm">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📄</div>
        <div class="upload-text">点击选择或拖拽 Markdown 文件和相关图片到此处</div>
        <div class="upload-hint">支持 .md / .markdown + 图片（.png .jpg .gif .svg .webp .bmp），单文件最大 20MB</div>
        <input type="file" id="fileInput" multiple accept=".md,.markdown,.png,.jpg,.jpeg,.gif,.svg,.webp,.bmp,text/markdown" style="display:none">
      </div>

      <div class="file-list" id="fileList">
        <div class="file-list-header">
          <span class="file-list-title" id="fileListTitle">已选择文件</span>
          <button type="button" class="file-list-clear" id="fileListClear">全部清除</button>
        </div>
        <div id="fileListItems"></div>
      </div>

      <label class="filename-label">输出文件名（不含扩展名，可选）</label>
      <input type="text" class="filename-input" id="filenameInput" placeholder="留空则使用原文件名">

      <button type="submit" class="submit-btn" id="submitBtn">转换为 Word & PDF</button>
    </form>

    <div class="progress" id="progress">
      <div class="spinner"></div>
      <div class="progress-text" id="progressText">正在转换中，请稍候...</div>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-title">✅ 转换完成！</div>
      <div class="download-list" id="downloadList"></div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📝</div>
        <div class="feature-text">支持 GFM 语法</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">表格 / 代码块</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🚀</div>
        <div class="feature-text">一键双格式</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🖼️</div>
        <div class="feature-text">图片嵌入</div>
      </div>
    </div>
  </div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const fileListItems = document.getElementById('fileListItems');
const fileListTitle = document.getElementById('fileListTitle');
const fileListClear = document.getElementById('fileListClear');
const filenameInput = document.getElementById('filenameInput');
const convertForm = document.getElementById('convertForm');
const submitBtn = document.getElementById('submitBtn');
const progress = document.getElementById('progress');
const progressText = document.getElementById('progressText');
const errorBox = document.getElementById('error');
const result = document.getElementById('result');
const downloadList = document.getElementById('downloadList');

const MD_EXT = ['.md', '.markdown'];
const IMG_EXT = ['.png', '.jpg', '.jpeg', '.gif', '.svg', '.webp', '.bmp'];
const ALLOWED_EXT = [...MD_EXT, ...IMG_EXT];

// 已选择文件列表，每项包含 { file, relativePath }
let selectedFiles = [];

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.items) {
        // 使用 DataTransferItemList 获取相对路径（拖拽文件夹时）
        handleDataTransfer(e.dataTransfer);
    } else if (e.dataTransfer.files.length) {
        handleFiles(Array.from(e.dataTransfer.files));
    }
});
fileInput.addEventListener('change', e => {
    if (e.target.files.length) {
        handleFiles(Array.from(e.target.files));
    }
});
fileListClear.addEventListener('click', () => {
    selectedFiles = [];
    fileInput.value = '';
    renderFileList();
    uploadArea.classList.remove('has-file');
    result.classList.remove('show');
    errorBox.classList.remove('show');
});

async function handleDataTransfer(dataTransfer) {
    const items = Array.from(dataTransfer.items);
    const entries = [];

    // 尝试获取 FileSystemEntry（支持目录结构）
    for (const item of items) {
        if (item.webkitGetAsEntry) {
            const entry = item.webkitGetAsEntry();
            if (entry) entries.push(entry);
        }
    }

    if (entries.length > 0) {
        const files = [];
        for (const entry of entries) {
            const resolved = await readEntry(entry, '');
            files.push(...resolved);
        }
        processSelectedFiles(files);
    } else {
        // 回退到普通 FileList
        handleFiles(Array.from(dataTransfer.files));
    }
}

// 递归读取 FileSystemEntry
function readEntry(entry, basePath) {
    return new Promise((resolve) => {
        if (entry.isFile) {
            entry.file(file => {
                const relativePath = basePath + file.name;
                resolve([{ file, relativePath }]);
            }, () => resolve([]));
        } else if (entry.isDirectory) {
            const dirReader = entry.createReader();
            const dirPath = basePath + entry.name + '/';
            dirReader.readEntries(async (entries) => {
                let allFiles = [];
                for (const sub of entries) {
                    const subFiles = await readEntry(sub, dirPath);
                    allFiles.push(...subFiles);
                }
                resolve(allFiles);
            }, () => resolve([]));
        } else {
            resolve([]);
        }
    });
}

function handleFiles(files) {
    // 没有目录结构时，用文件名作为相对路径
    const items = files.map(f => ({ file: f, relativePath: f.name }));
    processSelectedFiles(items);
}

function processSelectedFiles(items) {
    for (const item of items) {
        const name = item.file.name.toLowerCase();
        const ext = getExt(name);
        if (!ALLOWED_EXT.includes(ext)) continue;
        if (item.file.size > 20 * 1024 * 1024) {
            showError(`文件 ${item.file.name} 超过 20MB 限制`);
            return;
        }
        // 避免重复添加同名文件
        const exists = selectedFiles.find(f => f.relativePath === item.relativePath);
        if (!exists) {
            selectedFiles.push(item);
        }
    }

    renderFileList();

    // 自动填充输出文件名（取第一个 md 文件的名称）
    if (!filenameInput.value) {
        const mdItem = selectedFiles.find(f => MD_EXT.includes(getExt(f.file.name.toLowerCase())));
        if (mdItem) {
            filenameInput.value = mdItem.file.name.replace(/\.(md|markdown)$/i, '');
        }
    }

    errorBox.classList.remove('show');
    result.classList.remove('show');
}

function getExt(name) {
    const dot = name.lastIndexOf('.');
    return dot >= 0 ? name.substring(dot) : '';
}

function renderFileList() {
    fileListItems.innerHTML = '';
    if (selectedFiles.length === 0) {
        fileList.classList.remove('show');
        uploadArea.classList.remove('has-file');
        return;
    }

    fileList.classList.add('show');
    uploadArea.classList.add('has-file');

    const mdCount = selectedFiles.filter(f => MD_EXT.includes(getExt(f.file.name.toLowerCase()))).length;
    const imgCount = selectedFiles.filter(f => IMG_EXT.includes(getExt(f.file.name.toLowerCase()))).length;
    fileListTitle.textContent = `已选择 ${mdCount} 个 Markdown + ${imgCount} 张图片`;

    // Markdown 文件排在前面
    const sorted = [...selectedFiles].sort((a, b) => {
        const aIsMd = MD_EXT.includes(getExt(a.file.name.toLowerCase())) ? 0 : 1;
        const bIsMd = MD_EXT.includes(getExt(b.file.name.toLowerCase())) ? 0 : 1;
        return aIsMd - bIsMd;
    });

    sorted.forEach((item, idx) => {
        const ext = getExt(item.file.name.toLowerCase());
        const isMd = MD_EXT.includes(ext);
        const badge = isMd ? 'MD' : 'IMG';
        const badgeClass = isMd ? '' : 'img';

        const el = document.createElement('div');
        el.className = 'file-item';
        el.innerHTML = `
            <div class="file-item-info">
                <span class="file-type-badge ${badgeClass}">${badge}</span>
                <span class="file-item-name" title="${item.relativePath}">${item.relativePath}</span>
                <span class="file-item-size">${formatSize(item.file.size)}</span>
            </div>
            <button type="button" class="file-item-remove" title="移除">&times;</button>
        `;
        el.querySelector('.file-item-remove').addEventListener('click', () => {
            selectedFiles = selectedFiles.filter(f => f !== item);
            renderFileList();
        });
        fileListItems.appendChild(el);
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

function showError(msg) {
    errorBox.textContent = '❌ ' + msg;
    errorBox.classList.add('show');
    result.classList.remove('show');
}

convertForm.addEventListener('submit', async e => {
    e.preventDefault();
    const mdFiles = selectedFiles.filter(f => MD_EXT.includes(getExt(f.file.name.toLowerCase())));
    if (mdFiles.length === 0) {
        showError('请至少选择一个 Markdown 文件');
        return;
    }

    errorBox.classList.remove('show');
    result.classList.remove('show');
    progress.classList.add('show');
    submitBtn.disabled = true;
    const imgCount = selectedFiles.length - mdFiles.length;
    progressText.textContent = imgCount > 0
        ? `正在上传 ${mdFiles.length} 个文档 + ${imgCount} 张图片并转换中...`
        : '正在上传并转换中...';

    const formData = new FormData();

    // 先附加 relativePaths（确保在文件之前发送，以便 multer 的 filename 回调可以读取）
    const pathMap = {};
    selectedFiles.forEach(item => {
        pathMap[item.file.name] = item.relativePath;
    });
    formData.append('relativePaths', JSON.stringify(pathMap));

    if (filenameInput.value.trim()) {
        formData.append('filename', filenameInput.value.trim());
    }

    // 附加所有文件
    selectedFiles.forEach(item => {
        formData.append('files', item.file);
    });

    try {
        const res = await fetch('/api/convert', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok || !data.success) {
            throw new Error(data.error || '转换失败');
        }
        downloadList.innerHTML = '';
        const formats = [
            { name: 'Word 文档', url: data.docx, cls: 'word', label: 'DOCX' },
            { name: 'PDF 文档', url: data.pdf, cls: 'pdf', label: 'PDF' }
        ];
        for (const fmt of formats) {
            const item = document.createElement('div');
            item.className = 'download-item';
            item.innerHTML = `
                <div class="download-item-info">
                    <span class="format-badge ${fmt.cls}">${fmt.label}</span>
                    <span>${fmt.name}</span>
                </div>
                <a class="download-btn" href="${fmt.url}" download>下载</a>
            `;
            downloadList.appendChild(item);
        }
        result.classList.add('show');
    } catch (err) {
        showError(err.message);
    } finally {
        progress.classList.remove('show');
        submitBtn.disabled = false;
    }
});

// 健康检查（延迟执行，不阻塞页面渲染）
setTimeout(() => {
    fetch('/api/health', { cache: 'no-store' }).then(r => r.json()).then(d => console.log('服务正常', d)).catch(() => {});
}, 100);
</script>
</body>
</html>
